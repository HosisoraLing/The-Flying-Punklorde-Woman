<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird 🐤</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #1a1a2e;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Press Start 2P', monospace, sans-serif;
}
canvas {
  border: 3px solid #e94560;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(233,69,96,0.4), 0 0 60px rgba(233,69,96,0.2);
  cursor: pointer;
  image-rendering: pixelated;
}
@media (max-width: 500px) {
  canvas {
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
}
/* Intro overlay */
#intro {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
}
#intro.hidden { display: none; }
#intro .panel {
  background: #1a1a2e;
  border: 3px solid #e94560;
  padding: 28px 24px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  -webkit-font-smoothing: none;
}
#intro h2 {
  color: #FFD700;
  font-size: 20px;
  font-family: monospace;
  margin-bottom: 16px;
  text-shadow: 2px 2px 0 #a08000;
}
#intro p {
  color: #ccc;
  font-size: 13px;
  font-family: monospace;
  line-height: 1.8;
  margin-bottom: 10px;
  text-align: left;
}
#intro .highlight { color: #FFD700; }
#intro .warn { color: #FF4444; }
#intro .btn {
  margin-top: 18px;
  padding: 12px 32px;
  background: #6C5CE7;
  color: #fff;
  border: 3px solid #5a4bd1;
  font-size: 15px;
  font-family: monospace;
  cursor: pointer;
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 #3a2ca0;
  -webkit-font-smoothing: none;
}
#intro .btn:active { background: #5a4bd1; }

/* Nickname input overlay */
#nameInput {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 998;
}
#nameInput.show { display: flex; }
#nameInput .panel {
  background: #1a1a2e;
  border: 3px solid #e94560;
  padding: 24px 20px;
  width: 300px;
  text-align: center;
}
#nameInput h3 {
  color: #FFD700;
  font-size: 16px;
  font-family: monospace;
  margin-bottom: 12px;
  -webkit-font-smoothing: none;
}
#nameInput input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  font-family: monospace;
  background: #0a0a1a;
  color: #FFF;
  border: 2px solid #555;
  outline: none;
  text-align: center;
  -webkit-font-smoothing: none;
}
#nameInput input:focus { border-color: #6C5CE7; }
#nameInput .btn {
  margin-top: 12px;
  padding: 10px 28px;
  background: #6C5CE7;
  color: #fff;
  border: 3px solid #5a4bd1;
  font-size: 14px;
  font-family: monospace;
  cursor: pointer;
  -webkit-font-smoothing: none;
  text-shadow: 2px 2px 0 #3a2ca0;
}
#nameInput .btn:active { background: #5a4bd1; }
#nameInput .msg {
  margin-top: 8px;
  font-size: 12px;
  font-family: monospace;
  color: #FF4444;
  min-height: 16px;
}
</style>
</head>
<body>
<div id="intro">
  <div class="panel">
    <h2>飞翔的朋克洛德人</h2>
    <p>
      狼尊成功骇入了黑塔女士的宝库，<br>
      拿回了被没收的<span class="highlight">游戏账号</span>！<br>
      但警报已经响起，黑塔随时会回来——<br>
      赶紧穿越庇尔波因特的夜空<span class="highlight">逃命</span>！
    </p>
    <p>
      <span class="warn">规则：</span><br>
      - 点击屏幕拍打翅膀，躲避大楼<br>
      - <span class="highlight">前76根管道</span>碰到了不会扣命<br>
      - 每得3分速度+10%，碰管道重置<br>
      - <span class="warn">第76层</span>将迎来黑塔BOSS战！<br>
      - BOSS战中自动射击，收集道具增强火力
    </p>
    <button class="btn" id="introStart">开始游戏</button>
  </div>
</div>
<div id="nameInput">
  <div class="panel">
    <h3>提交分数</h3>
    <input type="text" id="nameField" placeholder="输入昵称（1-8字）" maxlength="8" autocomplete="off">
    <button class="btn" id="submitBtn">上榜</button>
    <button class="btn" id="closeNameInput" style="background:#555;border-color:#444;margin-top:8px;">关闭</button>
    <div class="msg" id="submitMsg"></div>
  </div>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const W = 400, H = 600;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  const ratio = W / H;
  let cw = window.innerWidth;
  let ch = window.innerHeight;
  if (cw / ch > ratio) {
    cw = ch * ratio;
  } else {
    ch = cw / ratio;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Audio context for sound effects
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, type, duration, vol=0.3) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function flapSound() { playSound(600, 'square', 0.1, 0.2); }
function scoreSound() { playSound(880, 'sine', 0.15, 0.3); setTimeout(() => playSound(1100, 'sine', 0.2, 0.3), 100); }
function hitSound() { playSound(200, 'sawtooth', 0.3, 0.4); setTimeout(() => playSound(100, 'sawtooth', 0.4, 0.3), 150); }

// BGM
const bgm = new Audio('bgm.mp3');
bgm.loop = true;
bgm.volume = 0.3;
let bgmStarted = false;
function startBGM() {
  if (!bgmStarted) {
    bgm.play().catch(() => {});
    bgmStarted = true;
  }
}

// Bird sprite
const birdImg = new Image();
birdImg.src = 'sliver_wolf_lv999.png';

// Boss sprite
const bossImg = new Image();
bossImg.src = 'The_Herta_Boss.png';

// Herta puppet sprite
const puppetImg = new Image();
puppetImg.src = 'herta_figure.png';

// Boss dialogue JSON
let bossDialogue = null;
fetch('boss_dialogue.json').then(r => r.json()).then(d => { bossDialogue = d; }).catch(() => {});

// Game state — all timing in milliseconds
const GRAVITY = 0.14;       // per-frame normalized (see dtFactor)
const FLAP = -3.7;          // per-frame normalized
const PIPE_WIDTH = 60;
const PIPE_GAP = 170;
const PIPE_SPEED = 2.2;     // per-frame normalized
const BIRD_SIZE = 20;
const MS_PER_FRAME = 16.67; // 60fps baseline for physics normalization
const GAME_SPEED = 1.4;     // overall speed multiplier

// Timers in milliseconds
const INVINCIBLE_MS = 3000;
const DEAD_DELAY_MS = 500;
const PIPE_BASE_INTERVAL_MS = 1100;   // ~66 frames
const PIPE_EXTRA_INTERVAL_MS = 1000;  // ~60 frames max extra
const PIPE_MAX_INTERVAL_MS = 2200;    // max gap between pipes

let bird, pipes, score, bestScore = 0, gameState;
let scoreSubmitted = false;
let lastSubmittedName = '';
const MAX_LIVES = 4;
const INITIAL_LIVES = 3;
let lives, invincibleTimerMs;
let speedBonus = 0; // 0–300, percentage bonus on pipe speed
let scoreSinceReset = 0; // points gained since last speed reset
let minSpeedMultiplier = 1.0; // minimum speed multiplier after 76 pipes
let maxSpeedBonus = 300; // maximum speed bonus
let particles = [];
let speedLines = [];
let muted = false;
let countdownMs = 0; // countdown before resume
let showLeaderboard = false;

// ===== Boss Battle System =====
let bossPhase = 'none'; // none | warning | clearing | dialogue | fight | victory | defeat
let bossWarningTimer = 0;
let bossDialogueIndex = 0;
let bossDialogueLineIndex = 0;
let bossDialogueCharTimer = 0;
let bossDialogueFullText = '';
let bossDialogueDisplayedText = '';
let bossDialogueAdvanceReady = false;

// Boss state
let boss = null; // { x, y, hp, maxHp, phase, timer, attackTimer, moveTimer, moveDir }
const BOSS_MAX_HP = 300;
const BOSS_WIDTH = 120;
const BOSS_HEIGHT = 140;

// Player bullets
let playerBullets = []; // { x, y, vx, vy, type: 'ray'|'laser'|'split', size }
let playerShootTimer = 0;
const PLAYER_SHOOT_INTERVAL = 300; // ms
const PLAYER_LASER_DURATION = 5000; // ms

// Boss projectiles
let bossProjectiles = []; // { x, y, vx, vy, type: 'laser'|'diamond', size, life }

// Power-ups
let powerUps = []; // { x, y, vy, type, size }
let powerUpSpawnTimer = 0;
const POWERUP_SPAWN_INTERVAL = 4000; // ms

// Active power-up effects
let activeEffects = {
  bulletTime: 0,      // remaining ms
  laserWeapon: 0,     // remaining ms
  bulletSplit: 0,     // remaining ms
  bulletTracking: 0,  // remaining ms
};

// Boss damage flash
let bossDamageFlash = 0;

// Player weapon type (normal | laser)
let playerWeapon = 'normal';

// Half-heart HP system for boss fight (max = lives * 2)
let playerHP = 6;
const MAX_HP = 6; // 3 hearts * 2

// Laser warning system
let laserWarnings = []; // { y, timer, duration }
const LASER_WARN_DURATION = 1500; // ms warning before firing

// Player laser beam (continuous beam when laser weapon active)
let playerLaserActive = false;
let playerLaserHitTimer = 0;

// Herta puppets
let puppets = []; // { x, y, vy, hp, timer, attackTimer, moveDir }
const PUPPET_WIDTH = 50;
const PUPPET_HEIGHT = 60;
const PUPPET_SPAWN_INTERVAL = 8000; // ms
const PUPPET_MAX = 5;
let puppetSpawnTimer = 0;

// Boss entrance animation
let bossEntranceY = -BOSS_HEIGHT; // starts above screen
let bossEntranceDone = false;

let targetGapY = H / 2;
let lastPipeGapY = H / 2;
let pipeSpawnTimerMs = 0;
let pipeSpawnIntervalMs = PIPE_BASE_INTERVAL_MS;

// Timing
let lastTime = 0;
let now = 0;       // total elapsed ms
let deadTimerMs = 0;

function resetGame() {
  bird = { x: 80, y: H / 2, vy: 0, rotation: 0 };
  pipes = [];
  score = 0;
  gameState = 'ready';
  targetGapY = H / 2;
  lastPipeGapY = H / 2;
  pipeSpawnTimerMs = 0;
  pipeSpawnIntervalMs = PIPE_BASE_INTERVAL_MS;
  lives = INITIAL_LIVES;
  invincibleTimerMs = 0;
  deadTimerMs = 0;
  speedBonus = 0;
  scoreSinceReset = 0;
  minSpeedMultiplier = 1.0;
  maxSpeedBonus = 300;
  particles = [];
  speedLines = [];
  countdownMs = 0;
  scoreSubmitted = false;
  lastSubmittedName = '';
  // Boss reset
  bossPhase = 'none';
  bossWarningTimer = 0;
  bossDialogueIndex = 0;
  bossDialogueLineIndex = 0;
  bossDialogueCharTimer = 0;
  bossDialogueFullText = '';
  bossDialogueDisplayedText = '';
  bossDialogueAdvanceReady = false;
  boss = null;
  playerBullets = [];
  playerShootTimer = 0;
  bossProjectiles = [];
  powerUps = [];
  powerUpSpawnTimer = 0;
  activeEffects = { bulletTime: 0, laserWeapon: 0, bulletSplit: 0, bulletTracking: 0 };
  bossDamageFlash = 0;
  playerWeapon = 'normal';
  playerHP = MAX_HP;
  laserWarnings = [];
  bossEntranceY = -BOSS_HEIGHT;
  bossEntranceDone = false;
  puppets = [];
  puppetSpawnTimer = 0;
  playerLaserActive = false;
  playerLaserHitTimer = 0;
}

resetGame();

function skipToBoss() {
  score = 76;
  pipes = [];
  speedBonus = 0;
  scoreSinceReset = 0;
  bossPhase = 'warning';
  bossWarningTimer = 0;
}

// Input
function handleFlap() {
  initAudio();
  startBGM();
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = FLAP;
    flapSound();
  } else if (gameState === 'playing') {
    bird.vy = FLAP;
    flapSound();
  } else if (gameState === 'dead' && deadTimerMs > DEAD_DELAY_MS && !nameInputEl.classList.contains('show')) {
    resetGame();
  }
}

function handleCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Boss dialogue — click to advance
  if (bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat') {
    handleBossDialogueAdvance();
    return;
  }

  // Pause button hit
  if (mx >= PAUSE_BTN.x && mx <= PAUSE_BTN.x + BTN_SIZE &&
      my >= PAUSE_BTN.y && my <= PAUSE_BTN.y + BTN_SIZE) {
    if (gameState === 'playing') {
      gameState = 'paused';
    } else if (gameState === 'paused') {
      gameState = 'countdown';
      countdownMs = 3000;
    }
    return;
  }

  // Mute button hit
  if (mx >= MUTE_BTN.x && mx <= MUTE_BTN.x + BTN_SIZE &&
      my >= MUTE_BTN.y && my <= MUTE_BTN.y + BTN_SIZE) {
    muted = !muted;
    bgm.muted = muted;
    return;
  }

  // Leaderboard button hit
  if (mx >= LB_BTN.x && mx <= LB_BTN.x + BTN_SIZE &&
      my >= LB_BTN.y && my <= LB_BTN.y + BTN_SIZE) {
    showLeaderboard = !showLeaderboard;
    if (showLeaderboard) {
      fetchLeaderboard();
      if (gameState === 'playing') {
        gameState = 'paused';
      }
    }
    return;
  }

  // Skip to boss button hit
  if (mx >= SKIP_BTN.x && mx <= SKIP_BTN.x + BTN_SIZE &&
      my >= SKIP_BTN.y && my <= SKIP_BTN.y + BTN_SIZE) {
    if (gameState === 'playing' && bossPhase === 'none' && score < 76) {
      skipToBoss();
    }
    return;
  }

  // Leaderboard overlay close button
  if (showLeaderboard) {
    const cbx = W / 2 - 60, cby = 370, cbw = 120, cbh = 36;
    if (mx >= cbx && mx <= cbx + cbw && my >= cby && my <= cby + cbh) {
      showLeaderboard = false;
      return;
    }
    return; // consume click when overlay is open
  }

  // Pause overlay buttons
  if (gameState === 'paused') {
    const cbx = W / 2 - 80, cby = H / 2 + 10, cbw = 160, cbh = 44;
    if (mx >= cbx && mx <= cbx + cbw && my >= cby && my <= cby + cbh) {
      gameState = 'countdown';
      countdownMs = 3000;
      return;
    }
    const rbx = W / 2 - 80, rby = H / 2 + 70, rbw = 160, rbh = 44;
    if (mx >= rbx && mx <= rbx + rbw && my >= rby && my <= rby + rbh) {
      resetGame();
      gameState = 'playing';
      return;
    }
    // Mute button in pause overlay
    const pmx = W / 2 + 100, pmy = H / 2 - 80;
    if (mx >= pmx && mx <= pmx + 32 && my >= pmy && my <= pmy + 32) {
      muted = !muted;
      bgm.muted = muted;
      return;
    }
    return;
  }

  handleFlap();
}

canvas.addEventListener('click', handleCanvasClick);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleCanvasClick(e.touches[0]); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    // Boss dialogue — space to advance
    if (bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat') {
      handleBossDialogueAdvance();
    } else {
      handleFlap();
    }
  }
  if (e.code === 'Enter' || e.code === 'KeyZ') {
    if (bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat') handleBossDialogueAdvance();
  }
  if (e.code === 'KeyM') { muted = !muted; bgm.muted = muted; }
  if (e.code === 'KeyL') { showLeaderboard = !showLeaderboard; if (showLeaderboard) fetchLeaderboard(); }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (gameState === 'playing') {
      gameState = 'paused';
    } else if (gameState === 'paused') {
      gameState = 'countdown';
      countdownMs = 3000;
    }
  }
});

// Draw functions
function drawSpeedLines() {
  for (let sl of speedLines) {
    ctx.globalAlpha = sl.alpha;
    const px = Math.round(sl.x / 2) * 2;
    const py = Math.round(sl.y / 2) * 2;
    const h = 4;
    // Dark outline
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(px - sl.len - 2, py - 1, sl.len + 4, h + 2);
    // White fill
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(px - sl.len, py + 1, sl.len, h - 2);
  }
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (let pt of particles) {
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    const s = Math.max(2, Math.round(pt.size / 2) * 2);
    const px = Math.round(pt.x / 2) * 2;
    const py = Math.round(pt.y / 2) * 2;
    ctx.fillRect(px - s / 2, py - s / 2, s, s);
  }
  ctx.globalAlpha = 1;
}
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);
  const size = BIRD_SIZE * 2;
  ctx.drawImage(birdImg, -size / 2, -size / 2, size, size);
  ctx.restore();
}

// Seeded random for consistent window patterns per pipe
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function drawBuilding(x, y1, y2, winColors) {
  const w = PIPE_WIDTH;
  // Building body
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(x, y1, w, y2 - y1);
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y1, w, y2 - y1);
  // Windows (pixel grid, colors pre-computed)
  const winW = 4, winH = 6, gap = 4;
  let idx = 0;
  for (let wy = y1 + 8; wy < y2 - 8; wy += winH + gap) {
    for (let wx = x + 6; wx < x + w - 6; wx += winW + gap) {
      ctx.fillStyle = winColors[idx++] || '#0a0a1a';
      ctx.fillRect(wx, wy, winW, winH);
    }
  }
  // Roof edge
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(x - 2, y1, w + 4, 4);
  ctx.fillRect(x - 2, y2 - 4, w + 4, 4);
}

function drawPipe(x, topH, bottomY, pipe) {
  drawBuilding(x, 0, topH, pipe.topWins);
  drawBuilding(x, bottomY, H, pipe.botWins);
}


// Pixel stars (pre-generated positions)
const stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.floor(Math.random() * W / 2) * 2,
    y: Math.floor(Math.random() * (H - 100) / 2) * 2,
    size: Math.random() > 0.8 ? 4 : 2,
    twinkle: Math.random() * Math.PI * 2,
  });
}

function drawBackground() {
  // Night sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0a0a2e');
  skyGrad.addColorStop(0.5, '#141438');
  skyGrad.addColorStop(1, '#1a1a40');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (flicker)
  for (let st of stars) {
    const flicker = 0.5 + 0.5 * Math.sin(now * 0.002 + st.twinkle);
    ctx.globalAlpha = flicker;
    ctx.fillStyle = '#FFF';
    ctx.fillRect(st.x, st.y, st.size, st.size);
  }
  ctx.globalAlpha = 1;

  // Moon (pixel circle)
  ctx.fillStyle = '#FFE8A0';
  const moonX = W - 70, moonY = 60;
  for (let dy = -16; dy <= 16; dy += 2) {
    for (let dx = -16; dx <= 16; dx += 2) {
      if (dx * dx + dy * dy <= 256) {
        ctx.fillRect(moonX + dx, moonY + dy, 2, 2);
      }
    }
  }
  ctx.fillStyle = '#EED680';
  ctx.fillRect(moonX - 4, moonY - 6, 4, 4);
  ctx.fillRect(moonX + 6, moonY + 2, 4, 4);
  ctx.fillRect(moonX - 2, moonY + 8, 4, 4);

  // Ground (dark road)
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = '#333350';
  ctx.fillRect(0, H - 42, W, 4);
  // Road dashes
  ctx.fillStyle = '#555570';
  for (let i = 0; i < W; i += 24) {
    const ox = (now * 0.05) % 24;
    ctx.fillRect(i - ox, H - 22, 12, 2);
  }
}


// Pixel text helper — snaps to 2px grid
function pixelText(text, x, y, size, color, align) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.fillText(text, Math.round(x / 2) * 2, Math.round(y / 2) * 2);
}

// Pixel heart (filled block shape)
function drawPixelHeart(x, y, s) {
  const p = s / 5;
  ctx.fillRect(x + p, y, p * 3, p);
  ctx.fillRect(x, y + p, p * 5, p);
  ctx.fillRect(x, y + p * 2, p * 5, p);
  ctx.fillRect(x + p, y + p * 3, p * 3, p);
  ctx.fillRect(x + p * 2, y + p * 4, p, p);
}

// Pixel box (sharp edges, no rounding)
function pixelBox(x, y, w, h, fill, stroke) {
  const px = Math.round(x / 2) * 2;
  const py = Math.round(y / 2) * 2;
  const pw = Math.round(w / 2) * 2;
  const ph = Math.round(h / 2) * 2;
  if (stroke) {
    ctx.fillStyle = stroke;
    ctx.fillRect(px - 2, py - 2, pw + 4, ph + 4);
  }
  ctx.fillStyle = fill;
  ctx.fillRect(px, py, pw, ph);
}

function drawScore() {
  pixelText(score, W / 2, 60, 36, '#FFF');
}

function drawLives() {
  ctx.fillStyle = '#FF4444';
  if (bossPhase === 'fight' || bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat' || bossPhase === 'clearing') {
    // Boss fight: show half-hearts based on playerHP
    const maxHearts = MAX_HP / 2;
    for (let i = 0; i < maxHearts; i++) {
      const hpForThisHeart = Math.max(0, Math.min(2, playerHP - i * 2));
      if (hpForThisHeart >= 2) {
        // Full heart
        ctx.fillStyle = '#FF4444';
        drawPixelHeart(10 + i * 24, 10, 16);
      } else if (hpForThisHeart === 1) {
        // Half heart — draw outline + left half filled
        ctx.fillStyle = '#444';
        drawPixelHeart(10 + i * 24, 10, 16);
        ctx.fillStyle = '#FF4444';
        ctx.fillRect(10 + i * 24 + 3, 10 + 2, 5, 12);
      } else {
        // Empty heart
        ctx.fillStyle = '#444';
        drawPixelHeart(10 + i * 24, 10, 16);
      }
    }
  } else {
    for (let i = 0; i < lives; i++) {
      drawPixelHeart(10 + i * 24, 10, 16);
    }
  }
}

function drawReady() {
  pixelText('点击开始', W / 2, H / 2 - 60, 22, '#FFF');

  // Animated pixel arrow
  const ay = Math.round((H / 2 - 10 + Math.sin(now * 0.003) * 8) / 2) * 2;
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(W / 2 - 4, ay, 8, 8);
  ctx.fillRect(W / 2 - 8, ay + 8, 16, 4);
  ctx.fillRect(W / 2 - 12, ay + 12, 24, 4);

  // Hints
  pixelText('P:暂停  M:静音  L:排行', W / 2, H / 2 + 30, 11, 'rgba(255,255,255,0.6)');
  pixelText('或点击下方按钮', W / 2, H / 2 + 48, 11, 'rgba(255,255,255,0.5)');
}

function drawGameOver() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  if (!scoreSubmitted) {
    // Show basic game over panel while name input is pending
    pixelBox(W / 2 - 120, H / 2 - 100, 240, 200, '#2D3436', '#E17055');
    pixelText('游戏结束', W / 2, H / 2 - 55, 26, '#FF4444');
    pixelText(`得分: ${score}`, W / 2, H / 2 - 10, 16, '#FFF');
    pixelText(`最高: ${bestScore}`, W / 2, H / 2 + 20, 16, '#FFD700');
    pixelBox(W / 2 - 70, H / 2 + 50, 140, 36, '#6C5CE7');
    pixelText('点击重新开始', W / 2, H / 2 + 74, 13, '#FFF');
  } else {
    // Show leaderboard
    const panelH = 340;
    pixelBox(W / 2 - 120, 20, 240, panelH, '#2D3436', '#E17055');
    pixelText('排行榜 Top 10', W / 2, 48, 16, '#FFD700');

    // Header
    pixelText('排名  昵称    分数', W / 2, 72, 10, '#888');

    // Entries
    const top10 = leaderboard.slice(0, 10);
    for (let i = 0; i < top10.length; i++) {
      const y = 92 + i * 22;
      const r = top10[i];
      const rank = `${i + 1}.`.padStart(3);
      const name = r.name.padEnd(4).slice(0, 4);
      const sc = String(r.score).padStart(4);
      const isMe = r.score === score && r.name === lastSubmittedName;
      const color = isMe ? '#FFD700' : (i < 3 ? '#FF8800' : '#CCC');
      pixelText(`${rank}  ${name}  ${sc}`, W / 2, y, 12, color);
    }

    if (top10.length === 0) {
      pixelText('暂无记录', W / 2, 120, 12, '#666');
    }

    // Restart button
    pixelBox(W / 2 - 70, panelH - 10, 140, 36, '#6C5CE7');
    pixelText('点击重新开始', W / 2, panelH + 14, 13, '#FFF');
  }
}

// Game loop — dt in ms
function update(dt) {
  if (gameState === 'playing') {
    // Physics normalized to 60fps baseline, scaled by GAME_SPEED
    const dtFactor = (dt / MS_PER_FRAME) * GAME_SPEED;

    // Freeze bird during dialogue/victory phases
    if (bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat') {
      bird.y = H / 2;
      bird.vy = 0;
      bird.rotation = 0;
    } else {
      bird.vy += GRAVITY * dtFactor;
      bird.y += bird.vy * dtFactor;
      bird.rotation = Math.min(Math.max(bird.vy * 0.05, -0.5), 1.2);
    }

    // Spawn trail particles behind the bird (reduced density, center-weighted)
    if (Math.random() < 0.35) {
      const particleColor = Math.random() < 0.5
        ? `rgba(138,43,226,${0.5 + Math.random() * 0.5})`
        : `rgba(30,144,255,${0.5 + Math.random() * 0.5})`;
      const pxBase = 2;
      // Triangular distribution centered on bird.y, spanning bird height
      const yBias = (Math.random() + Math.random() - 1) * BIRD_SIZE * 0.8;
      particles.push({
        x: bird.x - BIRD_SIZE,
        y: bird.y + yBias,
        vx: -0.4 - Math.random() * 0.8,
        vy: (Math.random() - 0.5) * 0.6,
        size: (2 + Math.floor(Math.random() * 3)) * pxBase,
        life: 1,
        decay: 0.008 + Math.random() * 0.01,
        color: particleColor,
      });
    }
    
    // Invincibility countdown (ms, scaled by GAME_SPEED)
    if (invincibleTimerMs > 0) {
      invincibleTimerMs -= dt * GAME_SPEED;
      // Clamp bird position during invincibility
      bird.y = Math.max(BIRD_SIZE, Math.min(H - 50 - BIRD_SIZE, bird.y));
    }
    
    // Spawn pipes — bigger height jump → longer gap (ms, scaled by GAME_SPEED)
    // Don't spawn new pipes during boss phases
    if (bossPhase === 'none') {
    pipeSpawnTimerMs += dt * GAME_SPEED;
    if (pipeSpawnTimerMs >= pipeSpawnIntervalMs) {
      pipeSpawnTimerMs = 0;

      // Gap shrinks as speed increases (170→100 at 300%)
      const gapRatio = 1 - speedBonus * 0.0014;
      const gapNow = Math.max(100, PIPE_GAP * gapRatio);

      // Jump range narrows at high speed for smoother transitions
      const jumpRange = (60 + 340 * Math.random()) * Math.max(0.3, gapRatio);
      const jump = (Math.random() - 0.5) * jumpRange;
      targetGapY += jump;
      targetGapY = Math.max(80, Math.min(H - 80 - gapNow, targetGapY));
      const topH = targetGapY;
      // Pre-generate window colors (fixed per pipe, no flicker)
      const rng = seededRand(Math.round(W * 137 + topH * 31) & 0x7FFFFFFF);
      function genWinColors(y1, y2) {
        const colors = [];
        const winW = 4, winH = 6, gap = 4;
        for (let wy = y1 + 8; wy < y2 - 8; wy += winH + gap) {
          for (let wx = 6; wx < PIPE_WIDTH - 6; wx += winW + gap) {
            const lit = rng() > 0.35;
            colors.push(lit ? (rng() > 0.5 ? '#FFE066' : '#FFCC33') : '#0a0a1a');
          }
        }
        return colors;
      }
      const topWins = genWinColors(0, topH);
      const botWins = genWinColors(topH + gapNow, H);
      pipes.push({ x: W, topH, bottomY: topH + gapNow, scored: false, topWins, botWins });

      // Interval: bigger height jump → longer minimum gap, then add randomness
      const heightDiff = Math.abs(targetGapY - lastPipeGapY);
      const baseInterval = PIPE_BASE_INTERVAL_MS * Math.max(0.6, 1 - speedBonus * 0.001);
      const minInterval = baseInterval + Math.floor((heightDiff / 80) * PIPE_EXTRA_INTERVAL_MS);
      const randomRange = PIPE_BASE_INTERVAL_MS * 0.4; // 40% random variation
      pipeSpawnIntervalMs = Math.min(PIPE_MAX_INTERVAL_MS, minInterval + Math.floor(Math.random() * randomRange));
      lastPipeGapY = targetGapY;
    }
    } // end bossPhase guard

    // Move pipes (ms), with speed bonus
    const speedMul = minSpeedMultiplier + speedBonus / 100;
    for (let p of pipes) {
      p.x -= PIPE_SPEED * dtFactor * speedMul;

      // Score
      if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
        p.scored = true;
        score++;
        scoreSinceReset++;
        scoreSound();
        // Trigger boss at score 76
        if (score === 76) {
          bossPhase = 'warning';
          bossWarningTimer = 0;
          // Don't spawn more pipes after this
        }
        if (scoreSinceReset % 3 === 0 && speedBonus < maxSpeedBonus) {
          speedBonus = Math.min(speedBonus + 10, maxSpeedBonus);
        }
      }
    }
    
    // Remove off-screen pipes
    pipes = pipes.filter(p => p.x > -PIPE_WIDTH);

    // Update particles
    for (let pt of particles) {
      pt.x += pt.vx * dtFactor;
      pt.y += pt.vy * dtFactor;
      pt.life -= pt.decay * dtFactor;
      pt.size *= 0.98;
    }
    particles = particles.filter(pt => pt.life > 0);

    // Speed lines — spawn and update
    if (speedBonus >= 10) {
      const spawnChance = 0.15 + (speedBonus / 300) * 0.6;
      if (Math.random() < spawnChance) {
        const len = 30 + (speedBonus / 300) * 80 + Math.random() * 40;
        speedLines.push({
          x: W + len,
          y: Math.random() * (H - 80) + 20,
          len,
          speed: 6 + (speedBonus / 300) * 14 + Math.random() * 4,
          alpha: 0.15 + (speedBonus / 300) * 0.3,
        });
      }
      for (let sl of speedLines) {
        sl.x -= sl.speed * dtFactor;
      }
      speedLines = speedLines.filter(sl => sl.x + sl.len > 0);
    }

    // Collision detection
    if (bird.y > H - 50 || bird.y < 0) {
      die(score < 76);
    }
    
    let hitPipe = false;
    for (let p of pipes) {
      if (bird.x + BIRD_SIZE * 0.7 > p.x && bird.x - BIRD_SIZE * 0.7 < p.x + PIPE_WIDTH) {
        if (bird.y - BIRD_SIZE * 0.6 < p.topH || bird.y + BIRD_SIZE * 0.6 > p.bottomY) {
          hitPipe = true;
          break;
        }
      }
    }
    if (hitPipe) {
      speedBonus = 0;
      scoreSinceReset = 0;
      speedLines = [];
      die(score < 76);
    }

    // ===== Boss Phase Updates =====
    updateBoss(dt, dtFactor);
  } else if (gameState === 'ready') {
    bird.y = H / 2 + Math.sin(now * 0.003) * 15;
  } else if (gameState === 'dead') {
    deadTimerMs += dt * GAME_SPEED;
  } else if (gameState === 'countdown') {
    countdownMs -= dt;
    if (countdownMs <= 0) {
      countdownMs = 0;
      gameState = 'playing';
      lastTime = 0;
    }
  }
  // 'paused' — do nothing, game frozen
}

function die(noLifeLoss) {
  if (invincibleTimerMs > 0) return;
  if (!noLifeLoss) lives--;
  if (lives <= 0) {
    gameState = 'dead';
    deadTimerMs = 0;
    speedBonus = 0;
    scoreSinceReset = 0;
    speedLines = [];
    // Reset boss state on death
    bossPhase = 'none';
    boss = null;
    bossProjectiles = [];
    playerBullets = [];
    powerUps = [];
    if (score > bestScore) bestScore = score;
    hitSound();
    fetchLeaderboard();
    setTimeout(showNameInput, 500);
  } else {
    hitSound();
    invincibleTimerMs = INVINCIBLE_MS;
    bird.vy = FLAP;
  }
}

// ===== Boss Battle Update =====
function updateBoss(dt, dtFactor) {
  if (bossPhase === 'none') return;

  // WARNING phase — show banner, move bird to center, boss descends
  if (bossPhase === 'warning') {
    bossWarningTimer += dt;
    // Smoothly move bird to center
    const targetY = H / 2;
    bird.y += (targetY - bird.y) * 0.08 * dtFactor;
    bird.vy = 0;
    bird.rotation = 0;
    if (bossWarningTimer >= 3000) {
      bossPhase = 'clearing';
      bird.y = H / 2;
    }
    return;
  }

  // Clearing phase — wait for all pipes to leave screen, lock bird
  if (bossPhase === 'clearing') {
    bird.y = H / 2;
    bird.vy = 0;
    bird.rotation = 0;
    if (pipes.length === 0) {
      bossPhase = 'dialogue';
      bossDialogueIndex = 0;
      bossDialogueLineIndex = 0;
      bossDialogueCharTimer = 0;
      bossDialogueFullText = '';
      bossDialogueDisplayedText = '';
      bossDialogueAdvanceReady = false;
      // Initialize boss for entrance animation
      bossEntranceY = -BOSS_HEIGHT;
      bossEntranceDone = false;
    }
    return;
  }

  // Dialogue phase
  if (bossPhase === 'dialogue') {
    if (!bossDialogue) return; // wait for JSON load
    const scenes = bossDialogue.scenes;
    if (bossDialogueIndex >= scenes.length) {
      // Dialogue done — start fight with entrance animation
      bossPhase = 'fight';
      bossEntranceY = -BOSS_HEIGHT;
      bossEntranceDone = false;
      boss = {
        x: W - BOSS_WIDTH / 2 - 20,
        y: -BOSS_HEIGHT,
        hp: BOSS_MAX_HP,
        maxHp: BOSS_MAX_HP,
        timer: 0,
        attackTimer: 0,
        moveTimer: 0,
        moveDir: 1,
        attackPattern: 0,
      };
      playerBullets = [];
      bossProjectiles = [];
      powerUps = [];
      playerShootTimer = 0;
      powerUpSpawnTimer = 0;
      laserWarnings = [];
      playerHP = MAX_HP;
      activeEffects = { bulletTime: 0, laserWeapon: 0, bulletSplit: 0, bulletTracking: 0 };
      playerWeapon = 'normal';
      return;
    }
    const scene = scenes[bossDialogueIndex];
    const fullLine = scene.lines[bossDialogueLineIndex] || '';
    if (bossDialogueFullText !== fullLine) {
      bossDialogueFullText = fullLine;
      bossDialogueDisplayedText = '';
      bossDialogueCharTimer = 0;
      bossDialogueAdvanceReady = false;
    }
    bossDialogueCharTimer += dt;
    // Typewriter effect: 50ms per character
    const charsToShow = Math.floor(bossDialogueCharTimer / 50);
    if (charsToShow >= fullLine.length) {
      bossDialogueDisplayedText = fullLine;
      bossDialogueAdvanceReady = true;
    } else {
      bossDialogueDisplayedText = fullLine.substring(0, charsToShow);
    }
    return;
  }

  // Advance dialogue (called from click handler)
  // Handled in handleBossDialogueAdvance()

  // Fight phase
  if (bossPhase === 'fight' && boss) {
    const btFactor = activeEffects.bulletTime > 0 ? 0.35 : 1.0;
    boss.timer += dt;
    boss.moveTimer += dt;
    boss.attackTimer += dt * btFactor;

    // Update active effects
    for (let key in activeEffects) {
      if (activeEffects[key] > 0) {
        activeEffects[key] -= dt;
        if (activeEffects[key] <= 0) activeEffects[key] = 0;
      }
    }
    // Sync laser weapon effect
    if (activeEffects.laserWeapon > 0) {
      playerWeapon = 'laser';
    } else {
      playerWeapon = 'normal';
    }

    // Boss entrance animation — descend from top
    if (!bossEntranceDone) {
      boss.y += 2.5 * dtFactor;
      if (boss.y >= H / 2) {
        boss.y = H / 2;
        bossEntranceDone = true;
      }
    } else {
      // Boss movement — sinusoidal up/down
      const moveSpeed = 2.0 + Math.sin(boss.timer * 0.001) * 0.8;
      boss.y += moveSpeed * boss.moveDir * dtFactor * btFactor;
      if (boss.y < BOSS_HEIGHT / 2 + 60) { boss.y = BOSS_HEIGHT / 2 + 60; boss.moveDir = 1; }
      if (boss.y > H - BOSS_HEIGHT / 2 - 50) { boss.y = H - BOSS_HEIGHT / 2 - 50; boss.moveDir = -1; }
      // Occasionally reverse direction randomly
      if (boss.moveTimer > 1500 + Math.random() * 2000) {
        boss.moveDir *= -1;
        boss.moveTimer = 0;
      }
    }

    // Boss attacks — only fire after entrance done, reduced frequency
    if (!bossEntranceDone) { boss.attackTimer = 0; }
    const attackInterval = 2500;
    if (boss.attackTimer >= attackInterval && bossEntranceDone) {
      boss.attackTimer = 0;
      boss.attackPattern = (boss.attackPattern + 1) % 3;
      if (boss.attackPattern === 0) {
        // Laser beam — first show warning line, then fire
        const warnY = boss.y;
        laserWarnings.push({ y: warnY, timer: 0, duration: LASER_WARN_DURATION, fired: false });
      } else if (boss.attackPattern === 1) {
        // Diamond bullets — aimed at player (slower)
        const dx = bird.x - boss.x;
        const dy = bird.y - boss.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const spd = 2.0;
        bossProjectiles.push({
          x: boss.x - BOSS_WIDTH / 2,
          y: boss.y,
          vx: (dx / dist) * spd,
          vy: (dy / dist) * spd,
          type: 'diamond',
          size: 10,
          life: 5000,
        });
      } else {
        // Spread diamonds (slower)
        for (let i = -1; i <= 1; i++) {
          bossProjectiles.push({
            x: boss.x - BOSS_WIDTH / 2,
            y: boss.y,
            vx: -2.5,
            vy: i * 0.8,
            type: 'diamond',
            size: 8,
            life: 4000,
          });
        }
      }
    }

    // Update laser warnings — after warning, fire stationary beam at fixed Y
    for (let w of laserWarnings) {
      w.timer += dt * btFactor;
      if (w.timer >= w.duration && !w.fired) {
        w.fired = true;
        w.fireTime = 0;
      }
      // Active laser beam
      if (w.fired) {
        w.fireTime += dt * btFactor;
        // Hit player during active beam (1000ms duration)
        if (w.fireTime <= 1000 && invincibleTimerMs <= 0) {
          const beamLeft = 0;
          const beamRight = w.source === 'puppet' ? 300 : (boss ? boss.x - BOSS_WIDTH / 2 : W);
          if (bird.x > beamLeft && bird.x < beamRight &&
              Math.abs(bird.y - w.y) < 12 + BIRD_SIZE * 0.5) {
            playerHP -= 2; // laser = 1 heart
            hitSound();
            if (playerHP <= 0) {
              playerHP = 0;
              bossPhase = 'defeat';
              bossDialogueIndex = 0;
              bossDialogueLineIndex = 0;
              bossDialogueCharTimer = 0;
              bossDialogueFullText = '';
              bossDialogueDisplayedText = '';
              bossDialogueAdvanceReady = false;
              bossProjectiles = [];
              playerBullets = [];
              puppets = [];
              laserWarnings = [];
            } else {
              invincibleTimerMs = INVINCIBLE_MS;
              bird.vy = FLAP;
            }
          }
        }
      }
    }
    laserWarnings = laserWarnings.filter(w => !w.fired || w.fireTime < 1200);

    // Player auto-shooting
    playerLaserActive = playerWeapon === 'laser';
    if (!playerLaserActive) {
      playerShootTimer += dt;
      const shootInterval = activeEffects.bulletSplit > 0 ? PLAYER_SHOOT_INTERVAL * 1.2 : PLAYER_SHOOT_INTERVAL;
      if (playerShootTimer >= shootInterval) {
        playerShootTimer = 0;
        // Normal ray bullet
        playerBullets.push({
          x: bird.x + BIRD_SIZE,
          y: bird.y,
          vx: 7,
          vy: 0,
          type: 'ray',
          size: 6,
          life: 2000,
        });
        // Bullet split
        if (activeEffects.bulletSplit > 0) {
          playerBullets.push({
            x: bird.x + BIRD_SIZE,
            y: bird.y - 8,
            vx: 6.5,
            vy: -1.5,
            type: 'split',
            size: 5,
            life: 2000,
          });
          playerBullets.push({
            x: bird.x + BIRD_SIZE,
            y: bird.y + 8,
            vx: 6.5,
            vy: 1.5,
            type: 'split',
            size: 5,
            life: 2000,
          });
        }
      }
    }

    // Player laser beam — continuous damage to boss/puppets
    if (playerLaserActive && boss && bossEntranceDone) {
      playerLaserHitTimer += dt;
      if (playerLaserHitTimer >= 100) { // damage every 100ms
        playerLaserHitTimer = 0;
        // Check if laser hits boss
        const bossLeft = boss.x - BOSS_WIDTH / 2;
        const bossTop = boss.y - BOSS_HEIGHT / 2;
        const bossBottom = boss.y + BOSS_HEIGHT / 2;
        if (bird.y > bossTop - 10 && bird.y < bossBottom + 10) {
          boss.hp -= 3;
          bossDamageFlash = 80;
          for (let k = 0; k < 2; k++) {
            particles.push({
              x: bossLeft, y: bird.y,
              vx: (Math.random() - 0.5) * 2,
              vy: (Math.random() - 0.5) * 2,
              size: 3 + Math.random() * 3,
              life: 1,
              decay: 0.03,
              color: 'rgba(0,200,255,0.9)',
            });
          }
          if (boss.hp <= 0) {
            boss.hp = 0;
            bossPhase = 'victory';
            bossDialogueIndex = 0;
            bossDialogueLineIndex = 0;
            bossDialogueCharTimer = 0;
            bossDialogueFullText = '';
            bossDialogueDisplayedText = '';
            bossDialogueAdvanceReady = false;
            bossProjectiles = [];
            puppets = [];
            laserWarnings = [];
            for (let k = 0; k < 40; k++) {
              const angle = (k / 40) * Math.PI * 2;
              particles.push({
                x: boss.x, y: boss.y,
                vx: Math.cos(angle) * (2 + Math.random() * 3),
                vy: Math.sin(angle) * (2 + Math.random() * 3),
                size: 6 + Math.random() * 6,
                life: 1,
                decay: 0.008 + Math.random() * 0.008,
                color: `hsl(${Math.random() * 60 + 300}, 100%, 70%)`,
              });
            }
            scoreSound();
          }
        }
        // Check if laser hits puppets
        for (let j = puppets.length - 1; j >= 0; j--) {
          const p = puppets[j];
          if (bird.y > p.y - PUPPET_HEIGHT / 2 - 10 && bird.y < p.y + PUPPET_HEIGHT / 2 + 10 &&
              bird.x < p.x) {
            p.hp -= 3;
            if (p.hp <= 0) {
              for (let k = 0; k < 12; k++) {
                particles.push({
                  x: p.x, y: p.y,
                  vx: (Math.random() - 0.5) * 4,
                  vy: (Math.random() - 0.5) * 4,
                  size: 4 + Math.random() * 4,
                  life: 1,
                  decay: 0.015,
                  color: `hsl(${Math.random() * 60 + 300}, 80%, 60%)`,
                });
              }
              puppets.splice(j, 1);
              scoreSound();
            }
          }
        }
      }
    } else {
      playerLaserHitTimer = 0;
    }

    // Update player bullets
    for (let b of playerBullets) {
      // Bullet tracking
      if (activeEffects.bulletTracking > 0 && b.type !== 'laser' && boss) {
        const dx = boss.x - b.x;
        const dy = boss.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const trackStr = 0.35;
        b.vx += (dx / dist) * trackStr * dtFactor;
        b.vy += (dy / dist) * trackStr * dtFactor;
        // Cap speed
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        if (spd > 12) { b.vx = (b.vx / spd) * 12; b.vy = (b.vy / spd) * 12; }
      }
      b.x += b.vx * dtFactor;
      b.y += b.vy * dtFactor;
      b.life -= dt;
    }
    playerBullets = playerBullets.filter(b => b.life > 0 && b.x < W + 20 && b.x > -20 && b.y > -20 && b.y < H + 20);

    // Update boss projectiles
    for (let p of bossProjectiles) {
      p.x += p.vx * dtFactor * btFactor;
      p.y += p.vy * dtFactor * btFactor;
      p.life -= dt;
    }
    bossProjectiles = bossProjectiles.filter(p => p.life > 0 && p.x > -40 && p.x < W + 40 && p.y > -40 && p.y < H + 40);

    // Player bullets hit boss
    const bossLeft = boss.x - BOSS_WIDTH / 2;
    const bossRight = boss.x + BOSS_WIDTH / 2;
    const bossTop = boss.y - BOSS_HEIGHT / 2;
    const bossBottom = boss.y + BOSS_HEIGHT / 2;
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      if (b.x + b.size / 2 > bossLeft && b.x - b.size / 2 < bossRight &&
          b.y + b.size / 2 > bossTop && b.y - b.size / 2 < bossBottom) {
        const dmg = b.type === 'laser' ? 5 : (b.type === 'split' ? 1 : 2);
        boss.hp -= dmg;
        bossDamageFlash = 100;
        playerBullets.splice(i, 1);
        // Hit particles
        for (let k = 0; k < 4; k++) {
          particles.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            size: 4 + Math.random() * 4,
            life: 1,
            decay: 0.02 + Math.random() * 0.02,
            color: b.type === 'laser' ? 'rgba(0,200,255,0.9)' : 'rgba(100,180,255,0.9)',
          });
        }
        if (boss.hp <= 0) {
          boss.hp = 0;
          bossPhase = 'victory';
          bossDialogueIndex = 0;
          bossDialogueLineIndex = 0;
          bossDialogueCharTimer = 0;
          bossDialogueFullText = '';
          bossDialogueDisplayedText = '';
          bossDialogueAdvanceReady = false;
          bossProjectiles = [];
          puppets = [];
          laserWarnings = [];
          // Victory particles explosion
          for (let k = 0; k < 40; k++) {
            const angle = (k / 40) * Math.PI * 2;
            particles.push({
              x: boss.x, y: boss.y,
              vx: Math.cos(angle) * (2 + Math.random() * 3),
              vy: Math.sin(angle) * (2 + Math.random() * 3),
              size: 6 + Math.random() * 6,
              life: 1,
              decay: 0.008 + Math.random() * 0.008,
              color: `hsl(${Math.random() * 60 + 300}, 100%, 70%)`,
            });
          }
          scoreSound();
        }
        break;
      }
    }

    // Boss projectiles hit player (half-heart HP system)
    if (invincibleTimerMs <= 0) {
      for (let i = bossProjectiles.length - 1; i >= 0; i--) {
        const p = bossProjectiles[i];
        const hitSize = p.type === 'laser' ? p.size : p.size / 2;
        if (Math.abs(p.x - bird.x) < hitSize + BIRD_SIZE * 0.6 &&
            Math.abs(p.y - bird.y) < hitSize + BIRD_SIZE * 0.6) {
          bossProjectiles.splice(i, 1);
          const dmg = p.type === 'laser' ? 2 : 1; // laser=1 heart, diamond=half heart
          playerHP -= dmg;
          hitSound();
          if (playerHP <= 0) {
            playerHP = 0;
            // Enter defeat dialogue instead of immediate death
            bossPhase = 'defeat';
            bossDialogueIndex = 0;
            bossDialogueLineIndex = 0;
            bossDialogueCharTimer = 0;
            bossDialogueFullText = '';
            bossDialogueDisplayedText = '';
            bossDialogueAdvanceReady = false;
            bossProjectiles = [];
            playerBullets = [];
            puppets = [];
            laserWarnings = [];
          } else {
            invincibleTimerMs = INVINCIBLE_MS;
            bird.vy = FLAP;
          }
          break;
        }
      }
    }

    // Power-up spawning
    powerUpSpawnTimer += dt;
    if (powerUpSpawnTimer >= POWERUP_SPAWN_INTERVAL) {
      powerUpSpawnTimer = 0;
      const types = ['heart', 'bulletTime', 'laser', 'split', 'tracking'];
      const type = types[Math.floor(Math.random() * types.length)];
      powerUps.push({
        x: 60 + Math.random() * (W - 200),
        y: -20,
        vy: 1.2 + Math.random() * 0.8,
        type,
        size: 18,
      });
    }

    // Update power-ups
    for (let pu of powerUps) {
      pu.y += pu.vy * dtFactor;
    }
    powerUps = powerUps.filter(pu => pu.y < H + 20);

    // Power-up collection (by bird touch OR player bullet hit)
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const pu = powerUps[i];
      let collected = false;
      // Bird touch
      if (Math.abs(pu.x - bird.x) < pu.size + BIRD_SIZE &&
          Math.abs(pu.y - bird.y) < pu.size + BIRD_SIZE) {
        collected = true;
      }
      // Player bullet hit
      if (!collected) {
        for (let j = playerBullets.length - 1; j >= 0; j--) {
          const b = playerBullets[j];
          if (Math.abs(pu.x - b.x) < pu.size + b.size &&
              Math.abs(pu.y - b.y) < pu.size + b.size) {
            collected = true;
            playerBullets.splice(j, 1);
            break;
          }
        }
      }
      if (collected) {
        powerUps.splice(i, 1);
        applyPowerUp(pu.type);
        for (let k = 0; k < 8; k++) {
          particles.push({
            x: pu.x, y: pu.y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            size: 4 + Math.random() * 4,
            life: 1,
            decay: 0.025,
            color: getPowerUpColor(pu.type),
          });
        }
      }
    }

    // Puppet spawning
    if (bossEntranceDone) {
      puppetSpawnTimer += dt;
      if (puppetSpawnTimer >= PUPPET_SPAWN_INTERVAL && puppets.length < PUPPET_MAX) {
        puppetSpawnTimer = 0;
        const py = 80 + Math.random() * (H - 200);
        puppets.push({
          x: W + PUPPET_WIDTH,
          y: py,
          vy: (Math.random() - 0.5) * 1.5,
          hp: 15,
          timer: 0,
          attackTimer: 2000 + Math.random() * 1500, // stagger first attack
          moveDir: Math.random() < 0.5 ? -1 : 1,
        });
      }
    }

    // Update puppets
    for (let p of puppets) {
      p.timer += dt;
      p.attackTimer += dt * btFactor;
      // Move left until x=300, then drift up/down
      if (p.x > 300) {
        p.x -= 1.5 * dtFactor;
      } else {
        p.y += p.vy * dtFactor * p.moveDir;
        if (p.y < PUPPET_HEIGHT / 2 + 40) { p.y = PUPPET_HEIGHT / 2 + 40; p.moveDir = 1; }
        if (p.y > H - PUPPET_HEIGHT / 2 - 50) { p.y = H - PUPPET_HEIGHT / 2 - 50; p.moveDir = -1; }
        if (p.timer > 2000 + Math.random() * 2000) {
          p.moveDir *= -1;
          p.timer = 0;
        }
      }
      // Puppet attacks — laser with warning
      if (p.x <= 300 && p.attackTimer >= 3500) {
        p.attackTimer = 0;
        laserWarnings.push({ y: p.y, timer: 0, duration: LASER_WARN_DURATION, fired: false, source: 'puppet' });
      }
    }

    // Player bullets hit puppets
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      const b = playerBullets[i];
      for (let j = puppets.length - 1; j >= 0; j--) {
        const p = puppets[j];
        if (Math.abs(b.x - p.x) < PUPPET_WIDTH / 2 + b.size &&
            Math.abs(b.y - p.y) < PUPPET_HEIGHT / 2 + b.size) {
          const dmg = b.type === 'laser' ? 5 : (b.type === 'split' ? 1 : 2);
          p.hp -= dmg;
          playerBullets.splice(i, 1);
          for (let k = 0; k < 3; k++) {
            particles.push({
              x: b.x, y: b.y,
              vx: (Math.random() - 0.5) * 2,
              vy: (Math.random() - 0.5) * 2,
              size: 3 + Math.random() * 3,
              life: 1,
              decay: 0.03,
              color: 'rgba(100,180,255,0.8)',
            });
          }
          if (p.hp <= 0) {
            // Puppet destroyed
            for (let k = 0; k < 12; k++) {
              particles.push({
                x: p.x, y: p.y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                size: 4 + Math.random() * 4,
                life: 1,
                decay: 0.015,
                color: `hsl(${Math.random() * 60 + 300}, 80%, 60%)`,
              });
            }
            puppets.splice(j, 1);
            scoreSound();
          }
          break;
        }
      }
    }

    // Remove off-screen puppets
    puppets = puppets.filter(p => p.x > -PUPPET_WIDTH * 2);

    // Boss damage flash decay
    if (bossDamageFlash > 0) bossDamageFlash -= dt;
  }

  // Victory dialogue phase
  if (bossPhase === 'victory') {
    if (!bossDialogue) return;
    const victory = bossDialogue.victory;
    const fullLine = victory.lines[bossDialogueLineIndex] || '';
    if (bossDialogueFullText !== fullLine) {
      bossDialogueFullText = fullLine;
      bossDialogueDisplayedText = '';
      bossDialogueCharTimer = 0;
      bossDialogueAdvanceReady = false;
    }
    bossDialogueCharTimer += dt;
    const charsToShow = Math.floor(bossDialogueCharTimer / 50);
    if (charsToShow >= fullLine.length) {
      bossDialogueDisplayedText = fullLine;
      bossDialogueAdvanceReady = true;
    } else {
      bossDialogueDisplayedText = fullLine.substring(0, charsToShow);
    }
  }

  // Defeat dialogue phase
  if (bossPhase === 'defeat') {
    if (!bossDialogue) return;
    const defeat = bossDialogue.defeat;
    const fullLine = defeat.lines[bossDialogueLineIndex] || '';
    if (bossDialogueFullText !== fullLine) {
      bossDialogueFullText = fullLine;
      bossDialogueDisplayedText = '';
      bossDialogueCharTimer = 0;
      bossDialogueAdvanceReady = false;
    }
    bossDialogueCharTimer += dt;
    const charsToShow = Math.floor(bossDialogueCharTimer / 50);
    if (charsToShow >= fullLine.length) {
      bossDialogueDisplayedText = fullLine;
      bossDialogueAdvanceReady = true;
    } else {
      bossDialogueDisplayedText = fullLine.substring(0, charsToShow);
    }
  }
}

function handleBossDialogueAdvance() {
  if (bossPhase === 'dialogue') {
    if (!bossDialogueAdvanceReady) {
      // Skip to full text
      bossDialogueDisplayedText = bossDialogueFullText;
      bossDialogueAdvanceReady = true;
      return;
    }
    const scenes = bossDialogue.scenes;
    const scene = scenes[bossDialogueIndex];
    bossDialogueLineIndex++;
    if (bossDialogueLineIndex >= scene.lines.length) {
      bossDialogueIndex++;
      bossDialogueLineIndex = 0;
    }
    bossDialogueCharTimer = 0;
    bossDialogueFullText = '';
    bossDialogueAdvanceReady = false;
  } else if (bossPhase === 'victory') {
    if (!bossDialogueAdvanceReady) {
      bossDialogueDisplayedText = bossDialogueFullText;
      bossDialogueAdvanceReady = true;
      return;
    }
    const victory = bossDialogue.victory;
    bossDialogueLineIndex++;
    if (bossDialogueLineIndex >= victory.lines.length) {
      // Victory dialogue done — continue game or end
      bossPhase = 'none';
      boss = null;
      bossProjectiles = [];
      playerBullets = [];
      powerUps = [];
      puppets = [];
      laserWarnings = [];
      // Continue playing with increased score milestones
    }
    bossDialogueCharTimer = 0;
    bossDialogueFullText = '';
    bossDialogueAdvanceReady = false;
  } else if (bossPhase === 'defeat') {
    if (!bossDialogueAdvanceReady) {
      bossDialogueDisplayedText = bossDialogueFullText;
      bossDialogueAdvanceReady = true;
      return;
    }
    const defeat = bossDialogue.defeat;
    bossDialogueLineIndex++;
    if (bossDialogueLineIndex >= defeat.lines.length) {
      // Defeat dialogue done — trigger actual death
      bossPhase = 'none';
      boss = null;
      gameState = 'dead';
      deadTimerMs = 0;
      speedBonus = 0;
      scoreSinceReset = 0;
      speedLines = [];
      if (score > bestScore) bestScore = score;
      fetchLeaderboard();
      setTimeout(showNameInput, 500);
    }
    bossDialogueCharTimer = 0;
    bossDialogueFullText = '';
    bossDialogueAdvanceReady = false;
  }
}

function applyPowerUp(type) {
  scoreSound();
  if (type === 'heart') {
    if (playerHP < MAX_HP) playerHP = Math.min(MAX_HP, playerHP + 2); // +1 heart
  } else if (type === 'bulletTime') {
    activeEffects.bulletTime = 6000;
  } else if (type === 'laser') {
    activeEffects.laserWeapon = 5000;
  } else if (type === 'split') {
    activeEffects.bulletSplit = 7000;
  } else if (type === 'tracking') {
    activeEffects.bulletTracking = 8000;
  }
}

function getPowerUpColor(type) {
  if (type === 'heart') return 'rgba(255,68,68,0.9)';
  if (type === 'bulletTime') return 'rgba(100,200,255,0.9)';
  if (type === 'laser') return 'rgba(255,200,0,0.9)';
  if (type === 'split') return 'rgba(0,255,100,0.9)';
  if (type === 'tracking') return 'rgba(200,100,255,0.9)';
  return 'rgba(255,255,255,0.9)';
}

function drawSpeedIndicator() {
  const totalSpeed = minSpeedMultiplier + speedBonus / 100;
  if (totalSpeed <= 1.0) return;
  const color = totalSpeed >= 4.0 ? '#FF4444' : totalSpeed >= 2.5 ? '#FF8800' : '#FFD700';
  pixelText(`x${totalSpeed.toFixed(1)}`, W - 10, 30, 14, color, 'right');
}

function drawBossWarning() {
  // Flashing WARNING banner
  const flash = Math.floor(now / 150) % 2 === 0;
  const alpha = flash ? 1.0 : 0.3;
  ctx.globalAlpha = alpha;

  // Red background strip
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(0, H / 2 - 50, W, 100);

  // Border lines
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(0, H / 2 - 52, W, 4);
  ctx.fillRect(0, H / 2 + 48, W, 4);

  // Diagonal warning stripes
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = -W; i < W * 2; i += 30) {
    ctx.beginPath();
    ctx.moveTo(i, H / 2 - 50);
    ctx.lineTo(i + 15, H / 2 - 50);
    ctx.lineTo(i + 15 + 100, H / 2 + 50);
    ctx.lineTo(i + 100, H / 2 + 50);
    ctx.fill();
  }

  // WARNING text
  pixelText('W  A  R  N  I  N  G', W / 2, H / 2 - 8, 32, '#FFF');
  pixelText('黑 塔 来 了', W / 2, H / 2 + 28, 18, '#FFD700');

  ctx.globalAlpha = 1;
}

function drawBossSprite() {
  if (!boss) return;
  const bx = boss.x - BOSS_WIDTH / 2;
  const by = boss.y - BOSS_HEIGHT / 2;

  // Damage flash
  if (bossDamageFlash > 0 && Math.floor(now / 50) % 2 === 0) {
    ctx.globalAlpha = 0.6;
  }

  // Draw boss image
  ctx.drawImage(bossImg, bx, by, BOSS_WIDTH, BOSS_HEIGHT);
  ctx.globalAlpha = 1;
}

function drawPuppets() {
  for (let p of puppets) {
    const px = Math.round(p.x / 2) * 2;
    const py = Math.round(p.y / 2) * 2;
    // Puppet sprite
    ctx.drawImage(puppetImg, px - PUPPET_WIDTH / 2, py - PUPPET_HEIGHT / 2, PUPPET_WIDTH, PUPPET_HEIGHT);
    // HP bar under puppet
    const barW = PUPPET_WIDTH;
    const barH = 4;
    const barX = px - barW / 2;
    const barY = py + PUPPET_HEIGHT / 2 + 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#e94560';
    ctx.fillRect(barX, barY, barW * (p.hp / 15), barH);
  }
}

function drawBossHPBar() {
  if (!boss) return;
  // HP bar at top center
  const barW = 240;
  const barH = 16;
  const barX = W / 2 - barW / 2;
  const barY = 16;

  // Boss name
  pixelText('黑 塔', W / 2, barY - 4, 14, '#e94560');

  // Bar background
  pixelBox(barX, barY + 10, barW, barH, '#1a1a2e', '#555');

  // HP fill
  const hpRatio = Math.max(0, boss.hp / boss.maxHp);
  const fillColor = hpRatio > 0.5 ? '#e94560' : hpRatio > 0.25 ? '#FF8800' : '#FF4444';
  ctx.fillStyle = fillColor;
  ctx.fillRect(barX + 2, barY + 12, (barW - 4) * hpRatio, barH - 4);

  // HP text
  pixelText(`${Math.ceil(boss.hp)}/${boss.maxHp}`, W / 2, barY + barH + 16, 10, '#CCC');
}

function drawBossDialogue() {
  if (!bossDialogue) return;

  let speaker, speakerName, text;
  if (bossPhase === 'dialogue') {
    const scene = bossDialogue.scenes[bossDialogueIndex];
    if (!scene) return;
    speaker = scene.speaker;
    speakerName = scene.speaker_name;
    text = bossDialogueDisplayedText;
  } else if (bossPhase === 'victory') {
    const victory = bossDialogue.victory;
    speaker = victory.speaker;
    speakerName = victory.speaker_name;
    text = bossDialogueDisplayedText;
  } else if (bossPhase === 'defeat') {
    const defeat = bossDialogue.defeat;
    speaker = defeat.speaker;
    speakerName = defeat.speaker_name;
    text = bossDialogueDisplayedText;
  } else {
    return;
  }

  // Dialogue box at bottom
  const boxX = 20;
  const boxY = H - 160;
  const boxW = W - 40;
  const boxH = 140;

  // Semi-transparent background
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  const borderColor = speaker === 'herta' || speaker === 'puppet' ? '#e94560' : '#6C5CE7';
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  // Speaker name
  const nameColor = borderColor;
  pixelText(speakerName, boxX + 16, boxY + 20, 14, nameColor, 'left');

  // Dialogue text
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  // Word wrap
  const maxWidth = boxW - 32;
  const lines = [];
  let currentLine = '';
  for (let i = 0; i < text.length; i++) {
    const testLine = currentLine + text[i];
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = text[i];
    } else {
      currentLine = testLine;
    }
  }
  lines.push(currentLine);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], boxX + 16, boxY + 46 + i * 22);
  }

  // Advance indicator
  if (bossDialogueAdvanceReady) {
    const indAlpha = Math.floor(now / 400) % 2 === 0 ? 1 : 0.3;
    ctx.globalAlpha = indAlpha;
    pixelText('▼', boxX + boxW - 24, boxY + boxH - 16, 14, '#FFD700');
    ctx.globalAlpha = 1;
  }

  // Draw speaker portrait in center of screen
  const portraitW = speaker === 'puppet' ? 100 : (speaker === 'herta' ? 140 : 80);
  const portraitH = speaker === 'puppet' ? 120 : (speaker === 'herta' ? 160 : 80);
  const portraitX = W / 2 - portraitW / 2;
  const portraitY = boxY - portraitH - 20;

  // Portrait background glow
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.shadowColor = speaker === 'herta' || speaker === 'puppet' ? '#e94560' : '#6C5CE7';
  ctx.shadowBlur = 30;
  ctx.fillStyle = speaker === 'herta' || speaker === 'puppet' ? '#e94560' : '#6C5CE7';
  ctx.fillRect(portraitX - 4, portraitY - 4, portraitW + 8, portraitH + 8);
  ctx.restore();

  // Portrait image
  if (speaker === 'herta') {
    ctx.drawImage(bossImg, portraitX, portraitY, portraitW, portraitH);
  } else if (speaker === 'puppet') {
    ctx.drawImage(puppetImg, portraitX, portraitY, portraitW, portraitH);
  } else {
    ctx.drawImage(birdImg, portraitX, portraitY, portraitW, portraitH);
  }

  // Portrait border
  ctx.strokeStyle = speaker === 'herta' || speaker === 'puppet' ? '#e94560' : '#6C5CE7';
  ctx.lineWidth = 2;
  ctx.strokeRect(portraitX, portraitY, portraitW, portraitH);
}

function drawPlayerBullets() {
  // Continuous laser beam
  if (playerLaserActive && boss) {
    const beamEnd = boss.x - BOSS_WIDTH / 2;
    const py = Math.round(bird.y / 2) * 2;
    const flash = Math.floor(now / 50) % 2 === 0;
    // Outer glow
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#00BFFF';
    ctx.fillRect(bird.x + BIRD_SIZE, py - 10, beamEnd - bird.x - BIRD_SIZE, 20);
    // Middle
    ctx.globalAlpha = flash ? 0.5 : 0.35;
    ctx.fillStyle = '#0088FF';
    ctx.fillRect(bird.x + BIRD_SIZE, py - 4, beamEnd - bird.x - BIRD_SIZE, 8);
    // Core
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#00DDFF';
    ctx.fillRect(bird.x + BIRD_SIZE, py - 2, beamEnd - bird.x - BIRD_SIZE, 4);
    // White center
    ctx.fillStyle = '#AAEEFF';
    ctx.fillRect(bird.x + BIRD_SIZE, py - 1, beamEnd - bird.x - BIRD_SIZE, 2);
  }

  for (let b of playerBullets) {
    const px = Math.round(b.x / 2) * 2;
    const py = Math.round(b.y / 2) * 2;
    if (b.type === 'split') {
      // Smaller green-tinted bullet
      ctx.fillStyle = '#00FF88';
      ctx.fillRect(px - 2, py - 2, 6, 6);
      ctx.fillStyle = '#AAFFCC';
      ctx.fillRect(px, py, 2, 2);
    } else {
      // Normal blue ray
      ctx.fillStyle = 'rgba(0,100,255,0.4)';
      ctx.fillRect(px - 2, py - b.size / 2 - 2, b.size * 2 + 4, b.size + 4);
      ctx.fillStyle = '#4488FF';
      ctx.fillRect(px, py - b.size / 2, b.size * 2, b.size);
      ctx.fillStyle = '#AADDFF';
      ctx.fillRect(px + 2, py - 1, b.size, 2);
    }
  }
}

function drawLaserWarnings() {
  for (let w of laserWarnings) {
    if (!w.fired) {
      // Warning phase — red line that gets brighter
      const progress = w.timer / w.duration;
      const alpha = 0.15 + progress * 0.35;
      const flash = Math.floor(now / 100) % 2 === 0;
      ctx.globalAlpha = flash ? alpha : alpha * 0.5;
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(0, w.y - 2, W, 4);
      ctx.fillStyle = 'rgba(255,0,0,0.1)';
      ctx.fillRect(0, w.y - 10, W, 20);
      ctx.globalAlpha = 1;
    } else if (w.fireTime <= 1000) {
      // Active laser beam — solid red beam from left to source
      const beamRight = w.source === 'puppet' ? 300 : (boss ? boss.x - BOSS_WIDTH / 2 : W);
      const flash = Math.floor(now / 60) % 2 === 0;
      // Outer glow
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(0, w.y - 14, beamRight, 28);
      // Middle layer
      ctx.globalAlpha = flash ? 0.5 : 0.35;
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(0, w.y - 6, beamRight, 12);
      // Core beam
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#FF8888';
      ctx.fillRect(0, w.y - 2, beamRight, 4);
      // White center
      ctx.fillStyle = '#FFCCCC';
      ctx.fillRect(0, w.y - 1, beamRight, 2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawBossProjectiles() {
  for (let p of bossProjectiles) {
    const px = Math.round(p.x / 2) * 2;
    const py = Math.round(p.y / 2) * 2;
    if (p.type === 'laser') {
      // Red laser beam
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(px - 20, py - p.size * 0.7, 40, p.size * 1.4);
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(px - 14, py - p.size / 2, 28, p.size);
      ctx.fillStyle = '#FFAAAA';
      ctx.fillRect(px - 8, py - 2, 16, 4);
    } else {
      // Diamond bullet — rotated square
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(now * 0.005);
      const s = p.size / 2;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#FF88AA';
      ctx.fillRect(-2, -2, 4, 4);
      ctx.restore();
    }
  }
}

function drawPowerUps() {
  for (let pu of powerUps) {
    const px = Math.round(pu.x / 2) * 2;
    const py = Math.round(pu.y / 2) * 2;
    const s = pu.size;

    // Glow
    ctx.globalAlpha = 0.3 + Math.sin(now * 0.005) * 0.2;
    ctx.fillStyle = getPowerUpColor(pu.type);
    ctx.fillRect(px - s / 2 - 4, py - s / 2 - 4, s + 8, s + 8);
    ctx.globalAlpha = 1;

    // Background box
    pixelBox(px - s / 2, py - s / 2, s, s, 'rgba(0,0,0,0.7)', getPowerUpColor(pu.type));

    // Icon
    if (pu.type === 'heart') {
      ctx.fillStyle = '#FF4444';
      drawPixelHeart(px - 6, py - 6, 12);
    } else if (pu.type === 'bulletTime') {
      // Clock icon
      ctx.fillStyle = '#64C8FF';
      ctx.fillRect(px - 4, py - 6, 8, 2);
      ctx.fillRect(px - 4, py + 4, 8, 2);
      ctx.fillRect(px - 6, py - 4, 2, 8);
      ctx.fillRect(px + 4, py - 4, 2, 8);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(px - 1, py - 4, 2, 5);
      ctx.fillRect(px - 1, py - 1, 4, 2);
    } else if (pu.type === 'laser') {
      // Laser icon
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(px - 6, py - 2, 12, 4);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(px - 2, py - 1, 4, 2);
    } else if (pu.type === 'split') {
      // Split icon (3 dots)
      ctx.fillStyle = '#00FF64';
      ctx.fillRect(px - 5, py - 1, 4, 4);
      ctx.fillRect(px, py - 4, 4, 4);
      ctx.fillRect(px + 2, py + 2, 4, 4);
    } else if (pu.type === 'tracking') {
      // Tracking icon (arrow)
      ctx.fillStyle = '#C864FF';
      ctx.fillRect(px - 4, py - 1, 8, 2);
      ctx.fillRect(px + 2, py - 4, 2, 4);
      ctx.fillRect(px + 2, py + 1, 2, 4);
    }
  }
}

function drawActiveEffectsUI() {
  // Show active power-up effects at bottom-left during boss fight
  if (bossPhase !== 'fight') return;
  let y = H - 55;
  const effects = [
    { key: 'bulletTime', name: '子弹时间', color: '#64C8FF' },
    { key: 'laserWeapon', name: '激光武器', color: '#FFD700' },
    { key: 'bulletSplit', name: '子弹分裂', color: '#00FF64' },
    { key: 'bulletTracking', name: '子弹追踪', color: '#C864FF' },
  ];
  for (let eff of effects) {
    if (activeEffects[eff.key] > 0) {
      const sec = Math.ceil(activeEffects[eff.key] / 1000);
      pixelText(`${eff.name} ${sec}s`, 10, y, 10, eff.color, 'left');
      y -= 16;
    }
  }
}

function draw() {
  drawBackground();

  for (let p of pipes) {
    drawPipe(p.x, p.topH, p.bottomY, p);
  }

  drawSpeedLines();
  drawParticles();

  // Bird blinks during invincibility (200ms on/off)
  if (invincibleTimerMs <= 0 || Math.floor(now / 200) % 2 === 0) {
    drawBird();
  }

  // Boss rendering
  if (bossPhase === 'warning') {
    drawBossWarning();
  }
  if (bossPhase === 'fight' || bossPhase === 'victory' || bossPhase === 'defeat') {
    drawLaserWarnings();
    drawBossProjectiles();
    drawPowerUps();
    drawPlayerBullets();
    drawPuppets();
    if (boss) drawBossSprite();
    drawBossHPBar();
    drawActiveEffectsUI();
  }
  if (bossPhase === 'dialogue' || bossPhase === 'victory' || bossPhase === 'defeat' || bossPhase === 'defeat') {
    drawBossDialogue();
  }

  if (bossPhase !== 'fight' && bossPhase !== 'dialogue' && bossPhase !== 'victory' && bossPhase !== 'warning' && bossPhase !== 'clearing') drawScore();
  drawLives();
  drawSpeedIndicator();

  if (gameState === 'ready') drawReady();
  if (gameState === 'dead') drawGameOver();
  if (gameState === 'paused') drawPauseOverlay();
  if (gameState === 'countdown') drawCountdown();
  if (gameState !== 'paused') drawUIButtons();
  if (showLeaderboard) drawLeaderboardOverlay();
}

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const dt = Math.min(timestamp - lastTime, 50); // cap at 50ms to avoid spiral
  lastTime = timestamp;
  now += dt;
  
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Intro overlay
const introEl = document.getElementById('intro');
const introBtn = document.getElementById('introStart');
introBtn.addEventListener('click', () => {
  introEl.classList.add('hidden');
  requestAnimationFrame(gameLoop);
});

// Pause music when page is hidden (mobile users leaving browser)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    bgm.pause();
  } else if (bgmStarted && !muted) {
    bgm.play().catch(() => {});
  }
});

// Leaderboard
let leaderboard = [];
let leaderboardTime = 0;
const LEADERBOARD_CACHE_MS = 10000;

async function fetchLeaderboard() {
  const now = Date.now();
  if (leaderboard.length > 0 && now - leaderboardTime < LEADERBOARD_CACHE_MS) return;
  try {
    const res = await fetch('/api/leaderboard');
    leaderboard = await res.json();
    leaderboardTime = now;
  } catch (e) {}
}

async function submitScore(name, score) {
  const res = await fetch('/api/score', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, score }),
  });
  return await res.json();
}

// Nickname input overlay
const nameInputEl = document.getElementById('nameInput');
const nameField = document.getElementById('nameField');
const submitBtn = document.getElementById('submitBtn');
const submitMsg = document.getElementById('submitMsg');

function showNameInput() {
  scoreSubmitted = false;
  nameInputEl.classList.add('show');
  nameField.value = '';
  submitMsg.textContent = '';
  // Reset button state
  submitBtn.textContent = '上榜';
  submitBtn.disabled = false;
  nameField.focus();
}

function hideNameInput() {
  nameInputEl.classList.remove('show');
}

submitBtn.addEventListener('click', async () => {
  // If already submitted, close and show leaderboard
  if (scoreSubmitted) {
    hideNameInput();
    showLeaderboard = true;
    return;
  }

  const name = nameField.value.trim();
  if (!name) { submitMsg.textContent = '请输入昵称'; return; }
  submitMsg.textContent = '提交中...';
  submitMsg.style.color = '#FFD700';
  submitBtn.disabled = true;
  const result = await submitScore(name, score);
  submitBtn.disabled = false;
  if (result.ok) {
    scoreSubmitted = true;
    lastSubmittedName = name;
    submitMsg.textContent = '提交成功！';
    submitMsg.style.color = '#4CAF50';
    submitBtn.textContent = '查看排行榜';
    // Force refresh leaderboard
    leaderboardTime = 0;
    await fetchLeaderboard();
  } else {
    submitMsg.textContent = result.error || '提交失败';
    submitMsg.style.color = '#FF4444';
  }
});

nameField.addEventListener('keydown', (e) => {
  if (e.code === 'Enter') submitBtn.click();
});

// Close button for name input
document.getElementById('closeNameInput').addEventListener('click', () => {
  hideNameInput();
});
</script>
