<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>飞翔的朋克洛德人</title>
<link rel="icon" href="sliver_wolf_lv999.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a1a;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: monospace;
}
img {
  max-width: 90vw;
  max-height: 75vh;
  border: 3px solid #e94560;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(233,69,96,0.4);
  image-rendering: auto;
  opacity: 0;
  transform: scale(0.9);
  animation: fadeIn 1.2s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; transform: scale(1); }
}
.btn {
  margin-top: 24px;
  padding: 14px 36px;
  background: #6C5CE7;
  color: #fff;
  border: 3px solid #5a4bd1;
  font-size: 16px;
  font-family: monospace;
  cursor: pointer;
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeIn 0.8s ease 1s forwards;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
  text-rendering: optimizeSpeed;
  image-rendering: pixelated;
  /* Pixel text shadow for depth */
  text-shadow: 2px 2px 0 #3a2ca0, -1px -1px 0 rgba(0,0,0,0.3);
}
.btn:active {
  background: #5a4bd1;
  transform: scale(0.96);
}
.hint {
  margin-top: 12px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  opacity: 0;
  animation: fadeIn 0.8s ease 1.4s forwards;
}
</style>
</head>
<body>
<img src="starrail_3rd_anniversary.jpg" alt="星穹铁道三周年贺图">
<button class="btn" onclick="location.href='game.html'">狼尊的小惊喜</button>
<div class="hint">点击上方按钮开始游戏</div>
</body>
</html>
